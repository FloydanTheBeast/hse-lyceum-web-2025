<!doctype html>
<html>
  <body>
    <form>
      <button type="submit">Списать деньги</button>
    </form>
  </body>

  <script>
    document.forms[0].onsubmit = (e) => {
      e.preventDefault();
      fetch("http://localhost:8080/transfer_money", {
        method: "POST",
        credentials: "include",
      })
        .then((response) => response.json())
        .then((data) => alert(JSON.stringify(data)));
    };
  </script>
</html>
